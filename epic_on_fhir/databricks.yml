# This is a Databricks asset bundle definition for epic_on_fhir.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: epic_on_fhir
  uuid: 6fff4968-d24d-4d81-9a83-d4d2e5a38493

include:
  - resources/epic*.yml
  - resources/*app.yml
  - resources/*.volume.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  secret_scope_name: 
    description: The secret scope name to use for the Epic on FHIR credentials
    default: epic_on_fhir_oauth_keys
  client_id_dbs_key:
    description: The secret key name in the scope to return the correct client id for the EPIC on FHIR application.  Use "client_id" for non-production workflows, and "client_id_prod" for production workflows. 
    default: client_id
  algo:
    description: Encryption algorithm used. 
    default: RS384
  token_url:
    description: Epic OAuth2 Token URL
    default: https://fhir.epic.com/interconnect-fhir-oauth/oauth2/token
  run_as_user:
    description: The User that the workflows should run as.
  higher_level_service_principal:
    description: The service principal name (application ID) for higher level deployments.  Comment this out if you are not using a service_principal for deployments above the dev target.
    default: 47c0365e-b1af-429c-b56d-07cfb18b5dc7
  serverless_environment_version:
    description: The serverless environment for which to run the workflows, notebook tasks, etc. 
    default: 4
  dashboard_embed_credentials:
    description: Set to true if the dashboard should use the owner's credentials, or false if the user's credentials should be used to run the dashboard and access Unity Catalog assets.  
    default: false
  model_deployment_version:
    description: The version of the model to deploy with the bundle
    default: "1"
  tags_project: 
    default: Open Epic Smart on FHIR
    description: Project tag to use for deployed resources.  
  tags_businessUnit:
    default: Healthcare and Life Sciences
    description: Business Unit tag to use for deployed resource cost and ROI allocation. 
  tags_developer:
    default: matthew.giglia@databricks.com
    description: Primary developer for Ops contact. 
  tags_requestedBy:
    default: Healthcare Providers and Health Plans
    description: Tag for the primary business unit stakeholder(s).  
  tags_RemoveAfter:
    default: 2027-02-25
    description: Required Databricks demo environment tag for long lived demos.  Can not be set more than one year after the deployment date. 
  

  

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    presets:
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    mode: development
    default: true
    workspace:
      host: https://fe-vm-mkgs-databricks-demos.cloud.databricks.com
      root_path: /Workspace/Users/${var.run_as_user}/.bundle/${bundle.name}/${bundle.target}
    resources:
      secret_scopes:
        epic_on_fhir_secret_scope:
          permissions:
          - user_name: ${var.run_as_user}
            level: MANAGE
          lifecycle:
            prevent_destroy: true
      experiments:
        epic_on_fhir_requests_experiment:
          permissions:
          - level: CAN_READ
            group_name: users
          - level: CAN_EDIT
            user_name: ${var.run_as_user}
      model_serving_endpoints:
        epic_on_fhir_requests_endpoint:
          permissions:
          - level: CAN_QUERY
            group_name: users
          - level: CAN_MANAGE
            user_name: ${var.run_as_user}
    variables:
      catalog: mkgs_dev
      schema: epic_on_fhir
      run_as_user: matthew.giglia@databricks.com
      client_id_dbs_key: client_id
      model_deployment_version: "18"

# assumes that a folder path of /Workspace/epic-on-fhir/ has been set up previously on the host workspace and that a service principal with appropriate permissions in Unity Catalog has been created and added below for the higher_level_service_principal variable.  
  sandbox_prod:
    mode: production
    default: false
    # comment out sync after first deployment
    sync:
      exclude:
        - resources/*serving.yml
    presets:
      name_prefix: "[sandbox] "
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    workspace:
      host: https://fe-vm-mkgs-databricks-demos.cloud.databricks.com/
      root_path: /Workspace/epic-on-fhir/.bundle/${bundle.name}/${bundle.target}
    resources:
      secret_scopes:
        epic_on_fhir_secret_scope:
          permissions:
          - service_principal_name: ${var.run_as_user}
            level: MANAGE
          lifecycle:
            prevent_destroy: true
      experiments:
        epic_on_fhir_requests_experiment:
          permissions:
          - level: CAN_READ
            group_name: users
          - level: CAN_MANAGE
            service_principal_name: ${var.run_as_user}
      model_serving_endpoints:
        epic_on_fhir_requests_endpoint:
          permissions:
          - level: CAN_QUERY
            group_name: users
          - level: CAN_MANAGE
            service_principal_name: ${var.run_as_user}
    variables:
      catalog: mkgs
      schema: open_epic_smart_on_fhir
      higher_level_service_principal: 47c0365e-b1af-429c-b56d-07cfb18b5dc7
      run_as_user: ${var.higher_level_service_principal}
      client_id_dbs_key: client_id
      model_deployment_version: "1"
    permissions:
      - user_name: matthewgiglia@mac.com
        level: CAN_MANAGE

# use only with real production Epic On FHIR Endpoints, Otherwise Use sandbox_prod target
  prod:
    mode: production
    workspace:
      host: https://dbc-de8ffabd-1dae.cloud.databricks.com/
      root_path: /Workspace/Users/matthewgiglia@mac.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: epic_on_fhir
      run_as_user: matthew.giglia@databricks.com
      client_id_dbs_key: client_id_prod
      model_deployment_version: "1"
    permissions:
      - user_name: matthewgiglia@mac.com
        level: CAN_MANAGE
