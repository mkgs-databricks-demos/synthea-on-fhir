resources:
  jobs:
    epic_on_fhir_model_registration:
      name: epic-on-fhir-model-registration
      description: Registers the Epic on FHIR model to Unity Catalog and optionally updates the serving endpoint configuration
      
      parameters:
        - name: catalog
          default: ${resources.schemas.epic_on_fhir_schema.catalog_name}
        - name: schema
          default: ${resources.schemas.epic_on_fhir_schema.name}
        - name: registered_model_name
          default: ${resources.schemas.epic_on_fhir_schema.catalog_name}.${resources.schemas.epic_on_fhir_schema.name}.${resources.registered_models.epic_on_fhir_requests_model.name}
        - name: endpoint_name
          default: ${resources.model_serving_endpoints.epic_on_fhir_requests_endpoint.name}
        - name: updateAIGatewayOnly
          default: "false"
      
      # Shared serverless environment for all notebook tasks
      environments:
        - environment_key: default
          spec:
            client: ${var.serverless_environment_version}
            dependencies:
              - "mlflow>=2.10.0"
              - "databricks-sdk>=0.20.0"
      
      tasks:
        # Condition task: Check if we should update AI Gateway only or do full deployment
        - task_key: check_update_mode
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.updateAIGatewayOnly}}"
            right: "true"
        
        # Task 1: Register and promote model (runs only if updateAIGatewayOnly=false)
        - task_key: register_and_promote_model
          depends_on:
            - task_key: check_update_mode
              outcome: "false"
          notebook_task:
            notebook_path: ../src/epic_on_fhir_requests_model_registration.ipynb
            base_parameters:
              registered_model_name: "{{job.parameters.registered_model_name}}"
          environment_key: default
        
        # Task 2: Update endpoint configuration (AI Gateway, telemetry, tags)
        # Runs after model registration OR directly when register_and_promote_model is skipped.
        # run_if: ALL_DONE ensures this task executes in both branches:
        #   - updateAIGatewayOnly=false: register_and_promote_model completes → this runs
        #   - updateAIGatewayOnly=true: register_and_promote_model is skipped (treated as done) → this runs
        - task_key: update_endpoint_config
          depends_on:
            - task_key: check_update_mode
            - task_key: register_and_promote_model
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../src/update-serving-endpoint-config.ipynb
            base_parameters:
              endpoint_name: "{{job.parameters.endpoint_name}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              component: epic-on-fhir
              environment: ${var.environment}
              project: epic-on-fhir-bundle
              owner: ${var.owner}
          environment_key: default
