resources:
  jobs:
    epic_on_fhir_model_registration:
      name: epic-on-fhir-model-registration
      description: |
        Registers the Epic on FHIR model to Unity Catalog with "challenger" alias.
        On successful registration, a new model version is created which triggers
        the deployment job (epic-on-fhir-model-deployment) automatically.
      
      parameters:
        - name: secret_scope_name
          default: ${var.secret_scope_name}
        - name: client_id_dbs_key
          default: ${var.client_id_dbs_key}
        - name: algo
          default: ${var.algo}
        - name: token_url
          default: ${var.token_url}
        - name: mlflow_experiment_name
          default: ${resources.experiments.epic_on_fhir_requests_experiment.name}
        - name: pip_index_url
          default: ${var.pip_index_url}
        - name: registered_model_name
          default: "${resources.schemas.epic_on_fhir_schema.catalog_name}.${resources.schemas.epic_on_fhir_schema.name}.${resources.registered_models.epic_on_fhir_requests_model.name}"
      
      # Only one registration at a time
      max_concurrent_runs: 1
      
      # Serverless environment
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_environment_version}
            dependencies:
              - "mlflow>=3.0.0"
              - "databricks-sdk>=0.20.0"
      
      tasks:
        - task_key: register_model
          notebook_task:
            notebook_path: ../src/epic-on-fhir-requests-model.ipynb
            base_parameters:
              secret_scope_name: "{{job.parameters.secret_scope_name}}"
              client_id_dbs_key: "{{job.parameters.client_id_dbs_key}}"
              algo: "{{job.parameters.algo}}"
              token_url: "{{job.parameters.token_url}}"
              mlflow_experiment_name: "{{job.parameters.mlflow_experiment_name}}"
              pip_index_url: "{{job.parameters.pip_index_url}}"
              registered_model_name: "{{job.parameters.registered_model_name}}"
          environment_key: default
