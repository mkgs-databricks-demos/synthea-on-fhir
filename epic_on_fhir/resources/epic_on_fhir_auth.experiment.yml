# MLflow experiment for epic_on_fhir_auth.
# Used for tracking model training runs and GenAI evaluations.

resources:
  experiments:
    epic_on_fhir_auth_experiment:
      name: /Workspace/experiments/epic_on_fhir_auth
      artifact_location: ${resources.volumes.mlflow_artifacts.path}
      tags:
        - key: description
          value: MLflow experiment for Epic on FHIR Authentication workflows and model runs
      permissions:
        - level: CAN_READ
          group_name: users
        - level: CAN_EDIT
          user_name: ${var.run_as_user}
