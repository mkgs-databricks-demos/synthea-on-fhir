resources:
  apps:
    jwk_url_app:
      name: "epic_jwk_oauth2_url"
      source_code_path: ../src/jwk_url_app
      description: "A Shiny App Used to Authenticate with OAuth2 for Epic on FHIR"
      config:
        command: ["shiny", "run", "--reload", 'app.py:app']
        env: 
          - name: EPIC_KID
            value: ${var.epic_kid}
          - name: ALGO
            value: ${var.algo}
          - name: SECRET_SCOPE_NAME
            value: ${var.secret_scope_name}
      resources:
        - name: "epic-on-fhir-public-key"
          description: "The Databricks Secret Scope that contains information about the EPIC on FHIR Authentication"
          secret: 
            scope: ${var.secret_scope_name}
            key: public_key
            permission: "READ"