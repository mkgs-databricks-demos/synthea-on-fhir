# Secret scope for storing Zerobus and Redox OAuth credentials
# This scope stores sensitive credentials like client IDs and secrets
resources:
  secret_scopes:
    zerobus_secret_scope:
      name: ${var.secret_scope_name}
      
      # Databricks-managed backend (not Azure Key Vault backed)
      backend_type: DATABRICKS
      
      # Prevent accidental deletion of the secret scope
      lifecycle:
        prevent_destroy: true

# Target-specific configurations
targets:
  dev:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            - user_name: ${var.run_as_user}
              level: MANAGE
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
  
  himss2026:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Service principal for app authentication
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher level service principal for deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
  
  prod:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Service principal for app authentication
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher level service principal for deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
  
  free_edition:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Service principal for app authentication
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher level service principal for deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
