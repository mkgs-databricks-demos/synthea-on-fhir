# This is a Databricks asset bundle definition for fhir_declarative_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: fhir_declarative_pipeline
  uuid: 830a0129-57db-4151-b2a1-182476db199c

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  schema_resolved:
    description: The schema, as its resolved from the target
  landing_volume: 
    description: The name of the volume for landing the FHIR bundles
    default: landing

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
    resources:
      schemas:
        fhir_schema:
          name: ${var.schema}
          catalog_name: ${var.catalog}
          comment: Development version of the FHIR schema for ${workspace.current_user.short_name}
      volumes:
        landing_volume:
          name: ${var.landing_volume}
          catalog_name: ${var.catalog}
          schema_name: ${var.schema_resolved}
    variables:
      catalog: hls_fde
      schema: fhir
      schema_resolved: ${bundle.target}_${workspace.current_user.short_name}_${var.schema}

  prod:
    mode: production
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/matthew.giglia@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/matthew.giglia@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hls_fde
      schema: prod
    permissions:
      - user_name: matthew.giglia@databricks.com
        level: CAN_MANAGE
