# FHIR Bundle Resource Parsing ETL pipeline.
#
# Parses and transforms FHIR bundle resources into structured Delta tables.
# Reads landed FHIR bundles from the landing volume via Auto Loader, ingests
# them as text (fhir_bronze) and VARIANT (fhir_bronze_variant), then extracts
# bundle metadata (bundle_meta), individual resources (fhir_resources — one row
# per resource with full VARIANT), EAV-exploded fields (fhir_resource_keys —
# one row per named field within each resource), and inferred schemas
# (fhir_resource_schemas).
#
# This pipeline produces the universal staging layer consumed by the downstream
# silver pipeline (fhir_resource_silver_etl). The silver pipeline reads from
# fhir_resources (VARIANT path extraction) and fhir_resource_schemas (type
# discovery). fhir_resource_keys is retained solely for schema inference.

resources:
  pipelines:
    fhir_bundle_ingestion_etl:
      name: FHIR Bundle Resource Parsing ETL
      catalog: ${var.catalog}
      schema: ${var.schema_resolved}
      serverless: true
      channel: "PREVIEW"
      continuous: false
      edition: "ADVANCED"
      root_path: "../src/fhir_bundle_ingestion_etl"

      libraries:
        - glob:
            include: ../src/fhir_bundle_ingestion_etl/transformations/**

      configuration:
        pipeline.landing_volume_path: "/Volumes/${var.catalog}/${var.schema_resolved}/${var.landing_volume}"
        pipeline.catalog_use: "${var.catalog}"
        pipeline.schema_use: "${var.schema_resolved}"

      event_log:
        catalog: ${var.catalog}
        schema: ${var.schema_resolved}
        name: fhir_bundle_ingestion_etl_event_log

      notifications:
        - email_recipients:
            - matthew.giglia@databricks.com
          alerts:
            - on-update-success
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - user_name: matthew.giglia@databricks.com
          level: CAN_MANAGE

      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}

      environment:
        dependencies:
          - --editable ${workspace.file_path}
