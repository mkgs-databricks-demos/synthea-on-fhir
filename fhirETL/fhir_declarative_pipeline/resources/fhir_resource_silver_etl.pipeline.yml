# FHIR Resource Silver ETL pipeline.
#
# Fully streaming architecture — no PIVOT, no materialized views, no batch
# intermediaries. Dynamically generates one streaming table per FHIR resource
# type discovered in fhir_resource_schemas (produced by fhir_bundle_ingestion_etl).
#
# For each resource type (e.g. Patient, Encounter, Condition):
#
#   1. {resource_type}_extract  - Temporary view: STREAM(fhir_resources) filtered
#                                 by resourceType with VARIANT path extraction for
#                                 references, identifiers, codes, and temporal fields.
#   2. {resource_type}          - Target streaming table: Auto CDC Type 1 upserts
#                                 keyed on {type}_uuid, sequenced by ingest_time.
#
# Uniform 10-column schema across all resource types:
#   {type}_uuid, bundle_uuid, {type}_url, references, identifiers, codes, status,
#   clinical_event_effective_start, clinical_event_effective_end, resource (VARIANT).
#
# All extraction uses try_variant_get (NULL-safe, no INVALID_VARIANT_CAST).
# No PIVOT, no shuffle, no aggregation — purely per-row VARIANT path extraction.
# Schema evolution: pipelines.reset.allowed = true on all silver tables.
#
# This pipeline should run AFTER fhir_bundle_ingestion_etl has completed.

resources:
  pipelines:
    fhir_resource_silver_etl:
      name: FHIR Resource Silver ETL
      catalog: ${var.catalog}
      schema: ${var.schema_resolved}
      serverless: true
      channel: "PREVIEW"
      continuous: false
      edition: "ADVANCED"
      root_path: "../src/fhir_resource_silver_etl"

      libraries:
        - glob:
            include: ../src/fhir_resource_silver_etl/transformations/**

      configuration:
        pipeline.catalog_use: "${var.catalog}"
        pipeline.schema_use: "${var.schema_resolved}"

      event_log:
        catalog: ${var.catalog}
        schema: ${var.schema_resolved}
        name: fhir_resource_silver_etl_event_log

      notifications:
        - email_recipients:
            - matthew.giglia@databricks.com
          alerts:
            - on-update-success
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - user_name: matthew.giglia@databricks.com
          level: CAN_MANAGE

      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}

      environment:
        dependencies:
          - --editable ${workspace.file_path}
