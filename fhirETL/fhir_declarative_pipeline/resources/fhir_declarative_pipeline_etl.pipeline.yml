# The main pipeline for fhir_declarative_pipeline

resources:
  pipelines:
    fhir_declarative_pipeline_etl:
      name: fhir_declarative_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/fhir_declarative_pipeline_etl"

      libraries:
        - glob:
            include: ../src/fhir_declarative_pipeline_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
