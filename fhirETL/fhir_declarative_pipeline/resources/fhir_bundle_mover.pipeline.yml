# Pipeline for moving FHIR bundles from source volume to landing volume.
#
# Uses Auto Loader (cloudFiles with binaryFile format) to incrementally detect new
# FHIR bundle files in the source volume. A Spark UDF distributes the file writes
# across the cluster, copying each file to the destination landing volume via the
# /Volumes FUSE mount. Results are tracked in the `file_tracker` streaming table,
# which records the source path, destination path, file size, and move status for
# each file. Files already present in the destination are skipped.
#
# Re-running the pipeline only processes new files (Auto Loader checkpoint handles
# deduplication). A full refresh reprocesses all source files but skips existing
# destination files unless they have been removed.

resources:
  pipelines:
    fhir_bundle_mover:
      name: fhir_bundle_mover
      catalog: ${var.catalog}
      schema: ${var.schema_resolved}
      serverless: true
      channel: "CURRENT"
      continuous: false
      edition: "ADVANCED"
      root_path: "../src/fhir_bundle_mover"

      libraries:
        - glob:
            include: ../src/fhir_bundle_mover/transformations/**

      configuration:
        pipeline.source_volume_path: "/Volumes/${var.catalog}/synthea_data_gen/synthetic_files_raw/output/fhir/"
        pipeline.dest_volume_path: "/Volumes/${var.catalog}/${var.schema_resolved}/${var.landing_volume}"

      event_log:
        catalog: ${var.catalog}
        schema: ${var.schema_resolved}
        name: fhir_bundle_mover_event_log

      notifications:
        - email_recipients:
            - matthew.giglia@databricks.com
          alerts:
            - on-update-success
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - user_name: matthew.giglia@databricks.com
          level: CAN_MANAGE

      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}

      environment:
        dependencies:
          - --editable ${workspace.file_path}
