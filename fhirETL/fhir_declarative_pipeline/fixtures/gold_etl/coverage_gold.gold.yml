# FHIR Gold Table: coverage_gold
# Source: silver coverage table
# Consumer: member eligibility, HEDIS continuous enrollment, payer mix analysis

table:
  name: coverage_gold
  comment: >-
    Entity-resolved canonical insurance coverage.
    One row per unique patient+payor+period_start.
    Consumer: member eligibility, HEDIS continuous enrollment, payer mix analysis.
  cluster_by:
    - patient_natural_key
    - period_start

source:
  silver_table: coverage
  join_type: event
  patient_ref_field: beneficiary

natural_key:
  column_name: coverage_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "FILTER(e.references, x -> x.field = 'payor')[0].display"
      default: "UNKNOWN_PAYOR"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: coverage_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this coverage."
    source: "e.coverage_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The beneficiary/member covered."
    source: "{{patient_natural_key}}"

  - name: status
    type: STRING
    comment: "Coverage status: active, cancelled, draft, entered-in-error."
    source: "e.status"

  - name: coverage_type_code
    type: STRING
    comment: "Coverage type (group, pay, EHCPOL, MILITARY). Defines insurance category."
    source: "try_variant_get(e.resource, '$.type.coding[0].code', 'STRING')"

  - name: coverage_type_display
    type: STRING
    comment: "Human-readable coverage type."
    source: "try_variant_get(e.resource, '$.type.coding[0].display', 'STRING')"

  - name: relationship_code
    type: STRING
    comment: "Beneficiary relationship to policyholder: self, spouse, child, other."
    source: "try_variant_get(e.resource, '$.relationship.coding[0].code', 'STRING')"

  - name: payor_display
    type: STRING
    comment: "Name of the insurance company/payer (e.g., Blue Cross, Medicare)."
    source: "FILTER(e.references, x -> x.field = 'payor')[0].display"

  - name: _payor_ref_url
    type: STRING
    comment: "Reference URL for the payor Organization resource."
    source: "FILTER(e.references, x -> x.field = 'payor')[0].url"

  - name: period_start
    type: TIMESTAMP
    comment: "When coverage became effective. Used for continuous enrollment calculations."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: period_end
    type: TIMESTAMP
    comment: "When coverage ended. NULL if still active."
    source: "CAST(e.clinical_event_effective_end AS TIMESTAMP)"

  - name: references
    type: "ARRAY<STRUCT<field: STRING, url: STRING, type: STRING, display: STRING>>"
    comment: "All references (beneficiary, payor, policyHolder, subscriber)."
    source: "e.references"

expectations:
  - name: coverage_nk_not_null
    expr: "coverage_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn

  - name: valid_status
    expr: "status IN ('active', 'cancelled', 'draft', 'entered-in-error') OR status IS NULL"
    action: warn
