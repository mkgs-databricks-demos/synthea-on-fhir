# FHIR Gold Table: observation_gold
# Source: silver observation table
# Consumer: lab results, vitals, social determinants, HEDIS lab-based measures

table:
  name: observation_gold
  comment: >-
    Entity-resolved canonical observation (labs, vitals, social history).
    One row per unique patient+code+effective_datetime. Polymorphic value
    support (quantity, string, codeable concept, raw VARIANT).
    Consumer: lab results, vitals panels, HEDIS lab-based measures.
  cluster_by:
    - patient_natural_key
    - code

source:
  silver_table: observation
  join_type: event
  patient_ref_field: subject

natural_key:
  column_name: observation_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "e.codes[0].code"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: observation_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this observation."
    source: "e.observation_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient this observation belongs to."
    source: "{{patient_natural_key}}"

  - name: code
    type: STRING
    comment: "LOINC observation code (e.g., 2093-3 = Total Cholesterol)."
    source: "e.codes[0].code"

  - name: code_system
    type: STRING
    comment: "Code system URI (typically http://loinc.org)."
    source: "e.codes[0].system"

  - name: code_display
    type: STRING
    comment: "Human-readable observation name."
    source: "e.codes[0].display"

  - name: category
    type: STRING
    comment: "Observation category: vital-signs, laboratory, social-history, survey, imaging, procedure."
    source: "try_variant_get(e.resource, '$.category[0].coding[0].code', 'STRING')"

  - name: value_quantity
    type: DOUBLE
    comment: "Numeric measurement value (e.g., 6.2 for HbA1c). NULL for non-numeric observations."
    source: "CAST(try_variant_get(e.resource, '$.valueQuantity.value', 'STRING') AS DOUBLE)"

  - name: value_unit
    type: STRING
    comment: "Unit of the quantity value (e.g., mg/dL, mmHg, %)."
    source: "try_variant_get(e.resource, '$.valueQuantity.unit', 'STRING')"

  - name: value_string
    type: STRING
    comment: "String-typed observation value (e.g., positive/negative for qualitative results)."
    source: "try_variant_get(e.resource, '$.valueString', 'STRING')"

  - name: value_code
    type: STRING
    comment: "Coded observation value (e.g., SNOMED code for qualitative results)."
    source: "try_variant_get(e.resource, '$.valueCodeableConcept.coding[0].code', 'STRING')"

  - name: value_raw
    type: VARIANT
    comment: "Raw polymorphic value as VARIANT for non-standard value types."
    source: "try_variant_get(e.resource, '$.value', 'VARIANT')"

  - name: effective_datetime
    type: TIMESTAMP
    comment: "When the observation was clinically relevant (specimen collected or measurement taken)."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: reference_range_low
    type: DOUBLE
    comment: "Low bound of normal reference range. Used for abnormal flagging."
    source: "CAST(try_variant_get(e.resource, '$.referenceRange[0].low.value', 'STRING') AS DOUBLE)"

  - name: reference_range_high
    type: DOUBLE
    comment: "High bound of normal reference range. Used for abnormal flagging."
    source: "CAST(try_variant_get(e.resource, '$.referenceRange[0].high.value', 'STRING') AS DOUBLE)"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "All codings (supports LOINC + local code dual coding)."
    source: "e.codes"

expectations:
  - name: observation_nk_not_null
    expr: "observation_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
