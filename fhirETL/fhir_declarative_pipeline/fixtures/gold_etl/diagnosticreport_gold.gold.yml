# FHIR Gold Table: diagnosticreport_gold
# Source: silver diagnosticreport table
# Consumer: lab result aggregation, imaging utilization, quality reporting

table:
  name: diagnosticreport_gold
  comment: >-
    Entity-resolved canonical diagnostic report (lab panels, imaging reports).
    One row per unique patient+code+effective_datetime. Consumer: lab result
    aggregation, imaging utilization, quality reporting.
  cluster_by:
    - patient_natural_key
    - code

source:
  silver_table: diagnosticreport
  join_type: event
  patient_ref_field: subject

natural_key:
  column_name: diagnosticreport_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "e.codes[0].code"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: diagnosticreport_url
    type: STRING
    comment: "Most recent FHIR fullUrl. Used to correlate observations to their parent report."
    source: "e.diagnosticreport_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient this report is about."
    source: "{{patient_natural_key}}"

  - name: code
    type: STRING
    comment: "LOINC panel/report code (e.g., 51990-0 = Basic metabolic panel)."
    source: "e.codes[0].code"

  - name: code_system
    type: STRING
    comment: "Code system URI (typically http://loinc.org)."
    source: "e.codes[0].system"

  - name: code_display
    type: STRING
    comment: "Human-readable report name."
    source: "e.codes[0].display"

  - name: category
    type: STRING
    comment: "Report category: LAB (laboratory), RAD (radiology), OTHER."
    source: "try_variant_get(e.resource, '$.category[0].coding[0].code', 'STRING')"

  - name: status
    type: STRING
    comment: "Report status: registered, partial, preliminary, final, amended, corrected, cancelled."
    source: "e.status"

  - name: effective_datetime
    type: TIMESTAMP
    comment: "Clinically relevant time for report (when specimen collected or imaging performed)."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: issued_datetime
    type: TIMESTAMP
    comment: "When the report was issued/released by the lab or radiology service."
    source: "CAST(try_variant_get(e.resource, '$.issued', 'STRING') AS TIMESTAMP)"

  - name: _encounter_ref_url
    type: STRING
    comment: "Raw encounter reference URL for downstream encounter FK resolution."
    source: "FILTER(e.references, x -> x.field = 'encounter')[0].url"

  - name: _bundle_uuid
    type: STRING
    comment: "Bundle UUID for encounter reference resolution."
    source: "e.bundle_uuid"

  - name: conclusion
    type: STRING
    comment: "Clinical conclusion/interpretation text from the diagnostician."
    source: "try_variant_get(e.resource, '$.conclusion', 'STRING')"

  - name: references
    type: "ARRAY<STRUCT<field: STRING, url: STRING, type: STRING, display: STRING>>"
    comment: "All references (subject, encounter, result observations, performer, specimen)."
    source: "e.references"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "All codings for the report code."
    source: "e.codes"

expectations:
  - name: diagreport_nk_not_null
    expr: "diagnosticreport_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
