# FHIR Gold Table: immunization_gold
# Source: silver immunization table
# Consumer: immunization registries, vaccine gap analysis, HEDIS immunization measures

table:
  name: immunization_gold
  comment: >-
    Entity-resolved canonical immunization event. One row per unique
    patient+vaccine_code+occurrence. Consumer: immunization registries,
    vaccine gap analysis, HEDIS immunization measures.
  cluster_by:
    - patient_natural_key
    - vaccine_code

source:
  silver_table: immunization
  join_type: event
  patient_ref_field: patient

natural_key:
  column_name: immunization_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "e.codes[0].code"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: immunization_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this immunization."
    source: "e.immunization_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient who received the vaccination."
    source: "{{patient_natural_key}}"

  - name: vaccine_code
    type: STRING
    comment: "CVX vaccine code (e.g., 140 = Influenza, seasonal, injectable, preservative free)."
    source: "e.codes[0].code"

  - name: vaccine_system
    type: STRING
    comment: "Code system URI (typically http://hl7.org/fhir/sid/cvx)."
    source: "e.codes[0].system"

  - name: vaccine_display
    type: STRING
    comment: "Human-readable vaccine name."
    source: "e.codes[0].display"

  - name: status
    type: STRING
    comment: "Immunization status: completed, entered-in-error, not-done."
    source: "e.status"

  - name: occurrence_datetime
    type: TIMESTAMP
    comment: "When the vaccine was administered."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "All codings for the vaccine code (supports CVX + NDC dual coding)."
    source: "e.codes"

expectations:
  - name: immunization_nk_not_null
    expr: "immunization_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
