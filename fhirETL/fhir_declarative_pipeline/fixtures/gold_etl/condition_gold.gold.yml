# FHIR Gold Table: condition_gold
# Source: silver condition table
# Consumer: problem lists, chronic disease registries, HEDIS diagnosis-based measures

table:
  name: condition_gold
  comment: >-
    Entity-resolved canonical condition (diagnosis/problem). One row per unique
    patient+code+onset. Consumer: problem lists, chronic disease registries,
    HEDIS diagnosis-based measures.
  cluster_by:
    - patient_natural_key
    - code

source:
  silver_table: condition
  join_type: event
  patient_ref_field: subject

natural_key:
  column_name: condition_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "e.codes[0].code"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: condition_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this condition record."
    source: "e.condition_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient with this condition."
    source: "{{patient_natural_key}}"

  - name: _encounter_ref_url
    type: STRING
    comment: "Raw encounter reference URL for downstream encounter FK resolution."
    source: "FILTER(e.references, x -> x.field = 'encounter')[0].url"

  - name: _bundle_uuid
    type: STRING
    comment: "Bundle UUID for encounter reference resolution."
    source: "e.bundle_uuid"

  - name: code
    type: STRING
    comment: "SNOMED condition code (e.g., 44054006 = Diabetes mellitus type 2)."
    source: "e.codes[0].code"

  - name: code_system
    type: STRING
    comment: "Code system URI (typically http://snomed.info/sct)."
    source: "e.codes[0].system"

  - name: code_display
    type: STRING
    comment: "Human-readable condition name."
    source: "e.codes[0].display"

  - name: category
    type: STRING
    comment: "Condition category: encounter-diagnosis, problem-list-item."
    source: "try_variant_get(e.resource, '$.category[0].coding[0].code', 'STRING')"

  - name: clinical_status
    type: STRING
    comment: "Current clinical status: active, recurrence, relapse, inactive, remission, resolved."
    source: "try_variant_get(e.resource, '$.clinicalStatus.coding[0].code', 'STRING')"

  - name: verification_status
    type: STRING
    comment: "Certainty: unconfirmed, provisional, differential, confirmed, refuted, entered-in-error."
    source: "try_variant_get(e.resource, '$.verificationStatus.coding[0].code', 'STRING')"

  - name: onset_datetime
    type: TIMESTAMP
    comment: "When the condition first manifested clinically."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: abatement_datetime
    type: TIMESTAMP
    comment: "When the condition resolved/went into remission. NULL if still active."
    source: "CAST(try_variant_get(e.resource, '$.abatementDateTime', 'STRING') AS TIMESTAMP)"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "All codings for the condition (supports multi-code scenarios)."
    source: "e.codes"

expectations:
  - name: condition_nk_not_null
    expr: "condition_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
