# FHIR Gold Table: careteam_gold
# Source: silver careteam table
# Consumer: care coordination, team-based care analytics, HEDIS care team measures

table:
  name: careteam_gold
  comment: >-
    Entity-resolved canonical care team. One row per unique
    patient+encounter+period_start. Links patients to their assigned
    care team members (providers, practitioners, organizations).
    Consumer: care coordination, team-based care analytics.
  cluster_by:
    - patient_natural_key
    - period_start

source:
  silver_table: careteam
  join_type: event
  patient_ref_field: subject

natural_key:
  column_name: careteam_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "FILTER(e.references, x -> x.field = 'encounter')[0].url"
      default: "NO_ENCOUNTER"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: careteam_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this care team."
    source: "e.careteam_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient this care team supports."
    source: "{{patient_natural_key}}"

  - name: status
    type: STRING
    comment: "Care team status: proposed, active, suspended, inactive, entered-in-error."
    source: "e.status"

  - name: period_start
    type: TIMESTAMP
    comment: "When the care team became active for this patient."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: period_end
    type: TIMESTAMP
    comment: "When the care team was dissolved. NULL if still active."
    source: "CAST(e.clinical_event_effective_end AS TIMESTAMP)"

  - name: reason_code
    type: STRING
    comment: "SNOMED code for the reason the care team was assembled (e.g., condition being managed)."
    source: "try_variant_get(e.resource, '$.reasonCode[0].coding[0].code', 'STRING')"

  - name: reason_display
    type: STRING
    comment: "Human-readable reason for the care team."
    source: "try_variant_get(e.resource, '$.reasonCode[0].coding[0].display', 'STRING')"

  - name: _encounter_ref_url
    type: STRING
    comment: "Encounter reference URL for downstream encounter FK resolution."
    source: "FILTER(e.references, x -> x.field = 'encounter')[0].url"

  - name: _managing_org_display
    type: STRING
    comment: "Display name of the managing organization."
    source: "FILTER(e.references, x -> x.field = 'managingOrganization')[0].display"

  - name: references
    type: "ARRAY<STRUCT<field: STRING, url: STRING, type: STRING, display: STRING>>"
    comment: "All references (subject, encounter, managingOrganization, participant members)."
    source: "e.references"

expectations:
  - name: careteam_nk_not_null
    expr: "careteam_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
