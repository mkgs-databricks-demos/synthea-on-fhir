# FHIR Gold Table: explanationofbenefit_gold
# Source: silver explanationofbenefit table
# Consumer: paid amount analysis, member cost sharing, HEDIS financial measures

table:
  name: explanationofbenefit_gold
  comment: >-
    Entity-resolved canonical Explanation of Benefit (adjudicated claim).
    One row per unique patient+type+period+claim. Represents payer adjudication
    of a claim. Consumer: paid amount analysis, member cost sharing, HEDIS
    financial measures.
  cluster_by:
    - patient_natural_key
    - eob_type_code
    - billable_period_start

source:
  silver_table: explanationofbenefit
  join_type: event
  patient_ref_field: patient

natural_key:
  column_name: explanationofbenefit_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "try_variant_get(e.resource, '$.type.coding[0].code', 'STRING')"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"
    - expr: "FILTER(e.references, x -> x.field = 'claim')[0].url"
      default: "NO_CLAIM"

columns:
  - name: explanationofbenefit_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this EOB."
    source: "e.explanationofbenefit_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The member/patient this EOB covers."
    source: "{{patient_natural_key}}"

  - name: eob_type_code
    type: STRING
    comment: "EOB type code: institutional, oral, pharmacy, professional, vision."
    source: "try_variant_get(e.resource, '$.type.coding[0].code', 'STRING')"

  - name: eob_type_display
    type: STRING
    comment: "Human-readable EOB type."
    source: "try_variant_get(e.resource, '$.type.coding[0].display', 'STRING')"

  - name: status
    type: STRING
    comment: "EOB status: active, cancelled, draft, entered-in-error."
    source: "e.status"

  - name: outcome
    type: STRING
    comment: "Adjudication outcome: queued, complete, error, partial."
    source: "try_variant_get(e.resource, '$.outcome', 'STRING')"

  - name: billable_period_start
    type: TIMESTAMP
    comment: "Start of the service period covered."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: billable_period_end
    type: TIMESTAMP
    comment: "End of the service period."
    source: "CAST(e.clinical_event_effective_end AS TIMESTAMP)"

  - name: total_amount
    type: DOUBLE
    comment: "Primary total amount from the first total entry."
    source: "CAST(try_variant_get(e.resource, '$.total[0].amount.value', 'STRING') AS DOUBLE)"

  - name: total_currency
    type: STRING
    comment: "Currency code for the total amount."
    source: "try_variant_get(e.resource, '$.total[0].amount.currency', 'STRING')"

  - name: total_category
    type: STRING
    comment: "Category of the primary total (submitted, benefit, deductible, copay)."
    source: "try_variant_get(e.resource, '$.total[0].category.coding[0].code', 'STRING')"

  - name: payment_amount
    type: DOUBLE
    comment: "Actual payment amount from the payer to the provider."
    source: "CAST(try_variant_get(e.resource, '$.payment.amount.value', 'STRING') AS DOUBLE)"

  - name: _claim_ref_url
    type: STRING
    comment: "Reference to the original Claim resource this EOB adjudicates."
    source: "FILTER(e.references, x -> x.field = 'claim')[0].url"

  - name: references
    type: "ARRAY<STRUCT<field: STRING, url: STRING, type: STRING, display: STRING>>"
    comment: "All references (patient, claim, insurer, provider, facility, careTeam)."
    source: "e.references"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "EOB-level codes."
    source: "e.codes"

expectations:
  - name: eob_nk_not_null
    expr: "explanationofbenefit_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
