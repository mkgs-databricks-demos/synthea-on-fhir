# FHIR Gold Table: medicationadministration_gold
# Source: silver medicationadministration table
# Consumer: medication reconciliation, compliance tracking, MAR

table:
  name: medicationadministration_gold
  comment: >-
    Entity-resolved canonical medication administration (actual dose given).
    One row per unique patient+medication+effective_datetime. Consumer:
    medication reconciliation, compliance tracking, MAR.
  cluster_by:
    - patient_natural_key
    - medication_code

source:
  silver_table: medicationadministration
  join_type: event
  patient_ref_field: subject

natural_key:
  column_name: medicationadministration_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "try_variant_get(e.resource, '$.medicationCodeableConcept.coding[0].code', 'STRING')"
      default: "UNKNOWN"
    - expr: "e.clinical_event_effective_start"
      default: "NULL"

columns:
  - name: medicationadministration_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this medication administration."
    source: "e.medicationadministration_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient who received the medication."
    source: "{{patient_natural_key}}"

  - name: medication_code
    type: STRING
    comment: "RxNorm or NDC code for the administered medication."
    source: "try_variant_get(e.resource, '$.medicationCodeableConcept.coding[0].code', 'STRING')"

  - name: medication_system
    type: STRING
    comment: "Code system URI (http://www.nlm.nih.gov/research/umls/rxnorm typically)."
    source: "try_variant_get(e.resource, '$.medicationCodeableConcept.coding[0].system', 'STRING')"

  - name: medication_display
    type: STRING
    comment: "Human-readable medication name with dose form."
    source: "try_variant_get(e.resource, '$.medicationCodeableConcept.coding[0].display', 'STRING')"

  - name: status
    type: STRING
    comment: "Administration status: in-progress, not-done, on-hold, completed, entered-in-error, stopped."
    source: "e.status"

  - name: effective_datetime
    type: TIMESTAMP
    comment: "When the medication was actually given to the patient."
    source: "CAST(e.clinical_event_effective_start AS TIMESTAMP)"

  - name: dosage_text
    type: STRING
    comment: "Free-text dosage instructions as administered."
    source: "try_variant_get(e.resource, '$.dosage.text', 'STRING')"

  - name: dose_value
    type: DOUBLE
    comment: "Numeric dose amount given (e.g., 500.0 for 500 mg)."
    source: "CAST(try_variant_get(e.resource, '$.dosage.dose.value', 'STRING') AS DOUBLE)"

  - name: dose_unit
    type: STRING
    comment: "Unit for the dose (e.g., mg, mL, unit)."
    source: "try_variant_get(e.resource, '$.dosage.dose.unit', 'STRING')"

  - name: codes
    type: "ARRAY<STRUCT<system: STRING, code: STRING, display: STRING>>"
    comment: "All medication codings (supports RxNorm + NDC dual coding)."
    source: "e.codes"

expectations:
  - name: medadmin_nk_not_null
    expr: "medicationadministration_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
