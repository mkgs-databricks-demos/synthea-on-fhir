# FHIR Gold Table: device_gold
# Source: silver device table
# Consumer: device registries, implant tracking, UDI compliance

table:
  name: device_gold
  comment: >-
    Entity-resolved canonical medical device. One row per unique
    patient+UDI (or type code if no UDI). Tracks implanted/used devices.
    Consumer: device registries, implant tracking, UDI compliance reporting.
  cluster_by:
    - patient_natural_key
    - device_type_code

source:
  silver_table: device
  join_type: event
  patient_ref_field: patient

natural_key:
  column_name: device_natural_key
  strategy: composite_sha2
  components:
    - expr: "{{patient_natural_key}}"
      default: "UNKNOWN"
    - expr: "try_variant_get(e.resource, '$.udiCarrier[0].deviceIdentifier', 'STRING')"
      default: "NO_UDI"
    - expr: "try_variant_get(e.resource, '$.type.coding[0].code', 'STRING')"
      default: "UNKNOWN"

columns:
  - name: device_url
    type: STRING
    comment: "Most recent FHIR fullUrl for this device."
    source: "e.device_url"

  - name: patient_natural_key
    type: STRING
    comment: "FK to patient_gold. The patient this device is associated with."
    source: "{{patient_natural_key}}"

  - name: status
    type: STRING
    comment: "Device status: active, inactive, entered-in-error."
    source: "e.status"

  - name: device_type_code
    type: STRING
    comment: "SNOMED code for the device type (e.g., 706298007 = Dental x-ray system)."
    source: "try_variant_get(e.resource, '$.type.coding[0].code', 'STRING')"

  - name: device_type_display
    type: STRING
    comment: "Human-readable device type name."
    source: "try_variant_get(e.resource, '$.type.coding[0].display', 'STRING')"

  - name: device_name
    type: STRING
    comment: "User-friendly device name."
    source: "try_variant_get(e.resource, '$.deviceName[0].name', 'STRING')"

  - name: udi_device_identifier
    type: STRING
    comment: "Unique Device Identifier (UDI) device identifier portion."
    source: "try_variant_get(e.resource, '$.udiCarrier[0].deviceIdentifier', 'STRING')"

  - name: udi_carrier_hrf
    type: STRING
    comment: "Full UDI carrier string in Human Readable Form (HRF)."
    source: "try_variant_get(e.resource, '$.udiCarrier[0].carrierHRF', 'STRING')"

  - name: serial_number
    type: STRING
    comment: "Device serial number."
    source: "try_variant_get(e.resource, '$.serialNumber', 'STRING')"

  - name: lot_number
    type: STRING
    comment: "Device lot/batch number."
    source: "try_variant_get(e.resource, '$.lotNumber', 'STRING')"

  - name: manufacture_date
    type: TIMESTAMP
    comment: "When the device was manufactured."
    source: "CAST(try_variant_get(e.resource, '$.manufactureDate', 'STRING') AS TIMESTAMP)"

  - name: expiration_date
    type: TIMESTAMP
    comment: "When the device expires."
    source: "CAST(try_variant_get(e.resource, '$.expirationDate', 'STRING') AS TIMESTAMP)"

  - name: references
    type: "ARRAY<STRUCT<field: STRING, url: STRING, type: STRING, display: STRING>>"
    comment: "All references (patient)."
    source: "e.references"

expectations:
  - name: device_nk_not_null
    expr: "device_natural_key IS NOT NULL"
    action: drop

  - name: patient_nk_not_null
    expr: "patient_natural_key IS NOT NULL"
    action: warn
