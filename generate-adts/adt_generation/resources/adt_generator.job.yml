resources:
  jobs:
    adt_generator_job:
      name: "ADT Message Generator - ${bundle.target}"
      
      # Job schedule (optional - uncomment to enable)
      # schedule:
      #   quartz_cron_expression: "0 0 2 * * ?" # Daily at 2 AM
      #   timezone_id: "America/New_York"
      #   pause_status: "UNPAUSED"
      
      # Email notifications (optional)
      email_notifications:
        # on_success:
        #   - matthew.giglia@databricks.com
        on_failure:
          - matthew.giglia@databricks.com
      
      # Timeout configuration
      timeout_seconds: 7200  # 2 hours
      max_concurrent_runs: 1
      
      # Serverless environment configuration
      environments:
        - environment_key: "serverless_env_v4"
          spec:
            environment_version: "4"
            dependencies:
              - "faker"  # Dependencies installed in the environment
      
      tasks:
        - task_key: generate_hl7_adt_messages
          description: "Generate synthetic HL7 ADT messages with Phase 1 & 2 enhancements"
          
          # Use serverless environment (version 4)
          environment_key: "serverless_env_v4"
          
          notebook_task:
            notebook_path: ../src/adt-generators.ipynb
            source: WORKSPACE
            
            # Pass variables as notebook parameters
            base_parameters:
              num_patients: "${var.num_patients}"
              events_per_patient_max: "${var.events_per_patient_max}"
              hl7_version: "${var.hl7_version}"
              sending_app: "${var.sending_app}"
              sending_facility: "${var.sending_facility}"
              receiving_app: "${var.receiving_app}"
              receiving_facility: "${var.receiving_facility}"
              catalog_use: "${var.catalog_use}"
              schema_use: "${var.schema_use}"
              volume_name: "${var.volume_name}"
              relative_path: "${var.relative_path}"
          
          # Timeout for this specific task
          timeout_seconds: 3600  # 1 hour
          
          # Retry configuration
          max_retries: 2
          min_retry_interval_millis: 60000  # 1 minute
          retry_on_timeout: true
      
      # Job-level tags
      tags:
        environment: "${bundle.target}"
        project: "adt_generation"
        notebook: "adt-generators"
        compute: "serverless"
